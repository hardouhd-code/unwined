<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#001710" />
    <meta
      name="description"
      content="Unwine-D - Votre cave digitale personnelle et sélection de vins d'exception."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>Unwine-D | La Cave Digitale</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&family=Manrope:wght@300;400;600;800&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <style>
      /* On force le fond sombre immédiatement selon DESIGN.md */
      html, body {
        margin: 0;
        padding: 0;
        background-color: #001710; /* Fond Deep Green */
        color: #c3ebda; /* Texte Mint */
        font-family: 'Manrope', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }

      /* Utilitaires globaux pour le design Stitch/Digital Cellar */
      .glass-blur {
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      /* Suppression visuelle de la scrollbar pour l'effet "App" */
      ::-webkit-scrollbar {
        display: none;
      }
      
      * {
        -ms-overflow-style: none;
        scrollbar-width: none;
        box-sizing: border-box;
      }

      /* Style pour les icônes Material */
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 200, 'grad' 0, 'opsz' 24;
      }
    </style>
  </head>
  <body>
    <noscript>Vous devez activer JavaScript pour profiter de Unwine-D.</noscript>
    
    <div id="root"></div>

    </body>
</html>
