name: Update Wine Catalog

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install
      - run: npm run sync:catalog
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull --rebase origin main
          git add src/lib/boirCatalog.js
          git diff --staged --quiet && echo "Aucun changement." && exit 0
          git commit -m "🍷 Synchro catalogue Boir.be"
          git push origin main
