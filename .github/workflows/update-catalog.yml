name: Update Wine Catalog

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-catalog:
    name: Sync Boir.be
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run catalog sync
        run: node scripts/sync-catalog.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push if changed
        run: |
          git config --global user.name 'Unwine-D Bot'
          git config --global user.email 'bot@unwine-d.com'
          git add src/lib/boirCatalog.js
          git diff --staged --quiet || (git commit -m "Auto-update catalogue Boir.be" && git push)
