name: Update Wine Catalog

on:
  schedule:
    - cron: '0 3 * * *' # S'exécute tous les jours à 3h00 UTC
  workflow_dispatch:      # Permet de le lancer manuellement

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Crucial pour que le script puisse enregistrer les vins
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Mise à jour vers la version 24

      - name: Install Dependencies
        run: npm install

      - name: Run Sync Script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/sync-catalog.js

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/lib/boirCatalog.js
          # On ne commit que s'il y a des changements (nouveaux vins)
          git diff --quiet && git diff --staged --quiet || (git commit -m "🍇 Mise à jour auto : Catalogue vins" && git push)
