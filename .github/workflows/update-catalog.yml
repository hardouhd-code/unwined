name: Update Wine Catalog

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # On passe en version 24 stable

      - name: Install Dependencies
        run: npm install

      - name: Run Sync Script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/sync-catalog.js

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/lib/boirCatalog.js
          git diff --quiet && git diff --staged --quiet || (git commit -m "🍇 Mise à jour auto : Catalogue vins" && git push)
